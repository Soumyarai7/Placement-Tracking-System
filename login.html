{% extends "base.html" %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card glass slide-up">
        <h2>Welcome Back</h2>
        <p>Please login to your account</p>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="off" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <div class="login-hints">
            <small>Admin login: admin / admin123</small><br>
            <small>Student login: student1 / student123</small>
            <p style="margin-top: 1rem;">Don't have an account? <a href="{{ url_for('register') }}">Sign up here</a></p>
        </div>
    </div>
</div>
{% endblock %}
